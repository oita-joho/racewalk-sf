<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Racewalk SF</title>
<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    background: #eef3f8;
    color: #1f2937;
  }

  header {
    background: #1f2937;
    color: #fff;
    padding: 14px 18px;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
  }

  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 14px;
  }

  .kv {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
  }

  .nav {
    margin-top: 10px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .nav a {
    color: #93c5fd;
    text-decoration: none;
    font-weight: 600;
  }

  .nav a:hover {
    text-decoration: underline;
  }

  .card {
    background: #fff;
    border: 1px solid #dbe4ee;
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 14px;
    box-shadow: 0 2px 8px rgba(15, 23, 42, 0.05);
  }

  .row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
  }

  .big {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .notice {
    font-size: 14px;
    line-height: 1.7;
    color: #4b5563;
  }

  .badge {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 999px;
    background: #334155;
    color: #fff;
    font-size: 12px;
    font-weight: 700;
  }

  .mono {
    font-family: Consolas, Menlo, monospace;
  }

  input,
  select,
  button {
    font: inherit;
  }

  input,
  select {
    padding: 9px 10px;
    border: 1px solid #cbd5e1;
    border-radius: 8px;
    background: #fff;
    min-height: 40px;
  }

  input:focus,
  select:focus {
    outline: none;
    border-color: #3b82f6;
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
  }

  button {
    min-height: 40px;
    padding: 9px 14px;
    border: none;
    border-radius: 8px;
    background: #2563eb;
    color: #fff;
    font-weight: 700;
    cursor: pointer;
    transition: 0.15s;
  }

  button:hover {
    opacity: 0.92;
  }

  button:disabled {
    opacity: 0.45;
    cursor: not-allowed;
  }

  .secondary {
    background: #64748b;
  }

  .danger {
    background: #dc2626;
  }

  .warning {
    background: #f59e0b;
    color: #111827;
  }

  .caution {
    background: #facc15;
    color: #111827;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    background: #fff;
    margin-top: 8px;
  }

  th,
  td {
    border-bottom: 1px solid #e5e7eb;
    padding: 10px 8px;
    text-align: left;
    vertical-align: middle;
    font-size: 14px;
  }

  th {
    background: #f8fafc;
    font-weight: 700;
  }

  tr:hover td {
    background: #f8fbff;
  }

  details summary {
    cursor: pointer;
    font-weight: 700;
    margin-bottom: 10px;
  }

  #fbStatus {
    margin-top: 8px;
    font-size: 14px;
    color: #374151;
  }

  .badge-dsq1,
  .badge-dsq2,
  .badge-notice {
    display: inline-block;
    padding: 4px 8px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
    color: #fff;
  }

  .badge-dsq1 {
    background: #b91c1c;
  }

  .badge-dsq2 {
    background: #7c2d12;
  }

  .badge-notice {
    background: #2563eb;
  }

  .lv-warning {
    color: #b45309;
    font-weight: 700;
  }

  .lv-caution {
    color: #ca8a04;
    font-weight: 700;
  }

  .lv-dsq1,
  .lv-dsq2 {
    color: #b91c1c;
    font-weight: 700;
  }

  @media (max-width: 768px) {
    main {
      padding: 10px;
    }

    .card {
      padding: 10px;
    }

    .big {
      font-size: 18px;
    }

    th,
    td {
      font-size: 13px;
      padding: 8px 6px;
    }

    button,
    input,
    select {
      width: 100%;
    }

    .row > * {
      flex: 1 1 100%;
    }
  }
</style>
</head>
<body>
  <header>Racewalk SF</header>
  <div id="app"></div>

  <script src="app.js"></script>
  <script type="module" src="firebase-roster.js"></script>
</body>
</html>
