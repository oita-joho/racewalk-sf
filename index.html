<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Racewalk SF</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      background: #f7f8fb;
    }
    header {
      background: #333;
      color: #fff;
      padding: 12px 16px;
      font-size: 20px;
      font-weight: bold;
    }
    .card {
      border: 1px solid #ddd;
      background: #fff;
      margin: 10px;
      padding: 12px;
      border-radius: 10px;
    }
    button {
      padding: 8px 12px;
      margin: 4px;
      cursor: pointer;
    }
    input, select {
      padding: 8px;
      margin: 4px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 8px;
      background: #fff;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 6px 8px;
      text-align: left;
    }
    .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .notice {
      color: #444;
      line-height: 1.6;
      font-size: 14px;
    }
    .big {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 6px;
    }
    .error {
      color: #b00020;
      font-weight: bold;
      padding: 24px;
    }
  </style>
</head>
<body>
  <header>Racewalk SF</header>
  <div id="app"></div>

  <script src="app.js"></script>
  <script type="module" src="firebase-roster.js"></script>
</body>
</html>
